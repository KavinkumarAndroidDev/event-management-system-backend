spring.application.name=EventManagementsystem
server.port = 8082

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true


spring.datasource.url=jdbc:mysql://ems-db.cy3wg6s8qzru.us-east-1.rds.amazonaws.com:3306/ems_db
spring.datasource.username=admin
spring.jpa.hibernate.ddl-auto=none

logging.file.name=logs/app.log
logging.level.root=INFO
logging.level.com.project.ems=DEBUG
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=7

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.keepalive-time=30000


server.servlet.context-path=/api

jwt.expiration.ms=86400000
jwt.refresh.expiration.ms=604800000	

otp.expiry.minutes=2
otp.expiry.seconds=30

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true


spring.datasource.password=${DB_PASSWORD}

jwt.secret=${JWT_SECRET}

spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}

razorpay.key.id=${RAZORPAY_KEY_ID}
razorpay.key.secret=${RAZORPAY_KEY_SECRET}