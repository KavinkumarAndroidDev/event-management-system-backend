spring.application.name=EventManagementsystem
server.port = 8082

spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:ems_db}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:978993532}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

logging.file.name=logs/app.log
logging.level.root=INFO
logging.level.com.example.rest=DEBUG
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=7


server.servlet.context-path=/api

jwt.secret=ems_super_secret_key_for_jwt_signing_must_be_long_enough_256bits
jwt.expiration.ms=86400000
jwt.refresh.expiration.ms=604800000	